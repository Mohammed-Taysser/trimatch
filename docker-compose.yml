services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set in .env — copy .env.example}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env — copy .env.example}
      POSTGRES_DB: ${POSTGRES_DB:?set in .env — copy .env.example}
    ports:
      - '${POSTGRES_HOST_PORT:?set in .env — copy .env.example}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '${REDIS_HOST_PORT:?set in .env — copy .env.example}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
