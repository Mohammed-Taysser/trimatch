# Explicit Dependabot config (ticket 869dz36n8): the implicit npm_and_yarn
# security jobs were failing on transitive-only deps in this pnpm workspace.
# Version updates run weekly and are grouped so the board gets one reviewable
# PR, not a spray; security updates are unaffected by this file.
version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'
    ignore:
      # ADR-0001: stay on sequelize 6 + @nestjs/sequelize until v7
      # (@sequelize/core) is stable and supported.
      - dependency-name: 'sequelize'
        update-types: ['version-update:semver-major']
      - dependency-name: 'sequelize-typescript'
        update-types: ['version-update:semver-major']
      - dependency-name: '@nestjs/sequelize'
        update-types: ['version-update:semver-major']
      # Types track the runtime we run, never lead it (batch review 869dzk3j5):
      # bump @types/node majors only alongside a deliberate Node bump.
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
      # Deliberate migrations tracked on the board — remove these once done:
      # typescript 6 → 869dzkqna.
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
