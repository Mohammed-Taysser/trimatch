name: CI

on:
  push:
    branches: [main]
  pull_request:

# Independent jobs run in parallel — each check fails in isolation, and only the
# integration job pays for the database services.
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm lint
      - run: pnpm format:check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm typecheck

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Unit tests (coverage gate 80%)
        run: pnpm test:cov

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: trimatch
          POSTGRES_PASSWORD: trimatch
          POSTGRES_DB: trimatch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trimatch -d trimatch"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Migrate & seed
        run: pnpm --filter @trimatch/api migrate && pnpm --filter @trimatch/api seed
      - name: Integration tests
        run: pnpm test:integration

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm build
      - name: Export OpenAPI
        run: pnpm --filter @trimatch/api openapi:export
      - uses: actions/upload-artifact@v7
        with:
          name: openapi
          path: docs/api/openapi.json
