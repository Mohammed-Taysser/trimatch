name: Setup workspace
description: Install pnpm + Node (with store cache), restore deps, and materialise the CI env file.
runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 22
        cache: pnpm
    - run: pnpm install --frozen-lockfile
      shell: bash
    # One source of truth for the CI env — the api (ConfigModule) and
    # sequelize-cli both read the repo-root .env.
    - run: cp .env.ci .env
      shell: bash
